# Builds the Vite React app to static files and deploys to GitHub Pages.
# In the repo: Settings → Pages → Build and deployment → Source: GitHub Actions.
#
# For https://<user>.github.io/<repo>/  the default PAGES_BASE_PATH is correct.
# For a user site (https://<user>.github.io/ only), add repo variable PAGES_BASE_PATH: /

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: diabetes-risk-predictor/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: diabetes-risk-predictor/frontend/package-lock.json
      - run: npm ci
      - name: Build static site
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ vars.PAGES_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: diabetes-risk-predictor/frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
